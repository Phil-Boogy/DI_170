<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMOJI QUEST 🕹️</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a1a;
            --panel: #12122a;
            --border: #3a3a6e;
            --neon-cyan: #00f5ff;
            --neon-pink: #ff00a8;
            --neon-yellow: #ffe600;
            --neon-green: #00ff88;
            --text: #e0e0ff;
            --dim: #7070a0;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'VT323', monospace;
            font-size: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px 48px;
            overflow-x: hidden;
        }

        /* Scanline overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 0, 0, 0.08) 2px,
                    rgba(0, 0, 0, 0.08) 4px);
            pointer-events: none;
            z-index: 999;
        }

        /* ── HEADER ── */
        header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            font-family: 'Press Start 2P', monospace;
            font-size: clamp(18px, 4vw, 30px);
            color: var(--neon-cyan);
            text-shadow:
                0 0 8px var(--neon-cyan),
                0 0 24px var(--neon-cyan),
                0 0 60px rgba(0, 245, 255, 0.4);
            letter-spacing: 2px;
            line-height: 1.4;
            animation: flicker 5s infinite;
        }

        .logo span {
            color: var(--neon-pink);
            text-shadow: 0 0 8px var(--neon-pink), 0 0 24px var(--neon-pink);
        }

        @keyframes flicker {

            0%,
            19%,
            21%,
            23%,
            25%,
            54%,
            56%,
            100% {
                opacity: 1;
            }

            20%,
            22%,
            24%,
            55% {
                opacity: 0.8;
            }
        }

        .tagline {
            font-family: 'VT323', monospace;
            font-size: 22px;
            color: var(--dim);
            margin-top: 8px;
            letter-spacing: 3px;
        }

        /* ── MAIN LAYOUT ── */
        .game-layout {
            display: grid;
            grid-template-columns: 1fr min(520px, 100%) 1fr;
            gap: 24px;
            width: 100%;
            max-width: 1100px;
        }

        .game-col {
            grid-column: 2;
        }

        .side-col {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding-top: 8px;
        }

        @media (max-width: 780px) {
            .game-layout {
                grid-template-columns: 1fr;
            }

            .side-left,
            .side-right {
                grid-column: 1;
            }
        }

        /* ── PANEL ── */
        .panel {
            background: var(--panel);
            border: 2px solid var(--border);
            border-radius: 4px;
            padding: 20px;
            position: relative;
        }

        .panel::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 4px;
            box-shadow: inset 0 0 30px rgba(58, 58, 110, 0.3);
            pointer-events: none;
        }

        .panel-title {
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            color: var(--neon-yellow);
            text-shadow: 0 0 6px var(--neon-yellow);
            letter-spacing: 2px;
            margin-bottom: 16px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        /* ── HUD: SCORE + STREAK ── */
        .hud {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 24px;
        }

        .hud-item {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            padding: 10px 12px;
            text-align: center;
        }

        .hud-label {
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            color: var(--dim);
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .hud-value {
            font-family: 'Press Start 2P', monospace;
            font-size: 18px;
            color: var(--neon-green);
            text-shadow: 0 0 8px var(--neon-green);
        }

        /* ── EMOJI DISPLAY ── */
        .emoji-stage {
            text-align: center;
            padding: 24px 0;
            position: relative;
        }

        .emoji-big {
            font-size: 96px;
            line-height: 1;
            display: block;
            filter: drop-shadow(0 0 20px rgba(0, 245, 255, 0.4));
            transition: transform 0.15s, filter 0.15s;
            cursor: default;
            user-select: none;
        }

        .emoji-big.pop {
            animation: pop 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97);
        }

        @keyframes pop {
            0% {
                transform: scale(1);
            }

            30% {
                transform: scale(1.3) rotate(-5deg);
            }

            60% {
                transform: scale(0.9) rotate(3deg);
            }

            100% {
                transform: scale(1);
            }
        }

        .question-text {
            font-size: 26px;
            color: var(--dim);
            margin-top: 12px;
            letter-spacing: 2px;
        }

        /* ── OPTIONS GRID ── */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 8px;
        }

        .option-btn {
            background: transparent;
            border: 2px solid var(--border);
            color: var(--text);
            font-family: 'VT323', monospace;
            font-size: 22px;
            letter-spacing: 1px;
            padding: 14px 8px;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.12s;
            position: relative;
            overflow: hidden;
        }

        .option-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--neon-cyan);
            opacity: 0;
            transition: opacity 0.12s;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
            box-shadow: 0 0 12px rgba(0, 245, 255, 0.3), inset 0 0 12px rgba(0, 245, 255, 0.05);
            transform: translateY(-2px);
        }

        .option-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .option-btn.correct {
            border-color: var(--neon-green);
            color: var(--neon-green);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
            background: rgba(0, 255, 136, 0.08);
        }

        .option-btn.wrong {
            border-color: var(--neon-pink);
            color: var(--neon-pink);
            box-shadow: 0 0 20px rgba(255, 0, 168, 0.4);
            background: rgba(255, 0, 168, 0.08);
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        /* ── FEEDBACK BANNER ── */
        #feedback {
            text-align: center;
            font-size: 28px;
            letter-spacing: 2px;
            min-height: 40px;
            margin: 16px 0 8px;
            transition: all 0.2s;
        }

        #feedback.correct {
            color: var(--neon-green);
            text-shadow: 0 0 12px var(--neon-green);
        }

        #feedback.wrong {
            color: var(--neon-pink);
            text-shadow: 0 0 12px var(--neon-pink);
        }

        /* ── NEXT BUTTON ── */
        #next-btn {
            display: none;
            width: 100%;
            margin-top: 12px;
            background: transparent;
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            font-family: 'Press Start 2P', monospace;
            font-size: 11px;
            padding: 14px;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.15s;
            text-shadow: 0 0 6px var(--neon-cyan);
            box-shadow: 0 0 12px rgba(0, 245, 255, 0.2);
        }

        #next-btn:hover {
            background: rgba(0, 245, 255, 0.1);
            box-shadow: 0 0 24px rgba(0, 245, 255, 0.4);
        }

        /* ── LEADERBOARD ── */
        .lb-form {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .lb-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid var(--border);
            color: var(--neon-yellow);
            font-family: 'VT323', monospace;
            font-size: 20px;
            padding: 8px 10px;
            outline: none;
            letter-spacing: 2px;
        }

        .lb-input:focus {
            border-color: var(--neon-yellow);
            box-shadow: 0 0 8px rgba(255, 230, 0, 0.3);
        }

        .lb-input::placeholder {
            color: var(--dim);
        }

        .lb-submit {
            background: transparent;
            border: 2px solid var(--neon-yellow);
            color: var(--neon-yellow);
            font-family: 'Press Start 2P', monospace;
            font-size: 9px;
            padding: 8px 12px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.12s;
        }

        .lb-submit:hover {
            background: rgba(255, 230, 0, 0.1);
            box-shadow: 0 0 12px rgba(255, 230, 0, 0.3);
        }

        .lb-list {
            list-style: none;
        }

        .lb-entry {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 6px;
            border-bottom: 1px solid rgba(58, 58, 110, 0.5);
            font-size: 20px;
            letter-spacing: 1px;
            transition: background 0.15s;
        }

        .lb-entry:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .lb-rank {
            font-family: 'Press Start 2P', monospace;
            font-size: 9px;
            min-width: 24px;
            text-align: center;
        }

        .rank-1 {
            color: var(--neon-yellow);
            text-shadow: 0 0 6px var(--neon-yellow);
        }

        .rank-2 {
            color: #c0c0c0;
        }

        .rank-3 {
            color: #cd7f32;
        }

        .lb-name {
            flex: 1;
            color: var(--text);
        }

        .lb-score {
            color: var(--neon-green);
            font-family: 'Press Start 2P', monospace;
            font-size: 11px;
        }

        .lb-empty {
            color: var(--dim);
            text-align: center;
            font-size: 18px;
            padding: 16px 0;
            letter-spacing: 2px;
        }

        /* ── STATS PANEL ── */
        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(58, 58, 110, 0.4);
            font-size: 20px;
        }

        .stat-key {
            color: var(--dim);
        }

        .stat-val {
            color: var(--neon-cyan);
            font-family: 'Press Start 2P', monospace;
            font-size: 11px;
        }

        /* ── LOADING ── */
        #loading {
            text-align: center;
            color: var(--dim);
            font-size: 22px;
            letter-spacing: 3px;
            padding: 40px 0;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0
            }
        }

        /* pixel corners decoration */
        .pixel-corner {
            position: absolute;
            width: 8px;
            height: 8px;
            background: var(--neon-cyan);
            opacity: 0.5;
        }

        .pc-tl {
            top: -1px;
            left: -1px;
        }

        .pc-tr {
            top: -1px;
            right: -1px;
        }

        .pc-bl {
            bottom: -1px;
            left: -1px;
        }

        .pc-br {
            bottom: -1px;
            right: -1px;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">EMOJI <span>QUEST</span> 🕹️</div>
        <div class="tagline">// CAN YOU NAME THEM ALL? //</div>
    </header>

    <div class="game-layout">

        <!-- LEFT SIDEBAR -->
        <div class="side-col side-left">
            <div class="panel">
                <div class="pixel-corner pc-tl"></div>
                <div class="pixel-corner pc-tr"></div>
                <div class="pixel-corner pc-bl"></div>
                <div class="pixel-corner pc-br"></div>
                <div class="panel-title">▶ STATS</div>
                <div class="stat-row"><span class="stat-key">CORRECT</span><span class="stat-val"
                        id="stat-correct">0</span></div>
                <div class="stat-row"><span class="stat-key">WRONG</span><span class="stat-val" id="stat-wrong">0</span>
                </div>
                <div class="stat-row"><span class="stat-key">ACCURACY</span><span class="stat-val"
                        id="stat-acc">—</span></div>
                <div class="stat-row"><span class="stat-key">BEST STREAK</span><span class="stat-val"
                        id="stat-best">0</span></div>
            </div>
        </div>

        <!-- GAME CENTER -->
        <div class="panel game-col">
            <div class="pixel-corner pc-tl"></div>
            <div class="pixel-corner pc-tr"></div>
            <div class="pixel-corner pc-bl"></div>
            <div class="pixel-corner pc-br"></div>

            <div class="hud">
                <div class="hud-item">
                    <div class="hud-label">SCORE</div>
                    <div class="hud-value" id="score">0</div>
                </div>
                <div class="hud-item">
                    <div class="hud-label">STREAK</div>
                    <div class="hud-value" id="streak">0🔥</div>
                </div>
                <div class="hud-item">
                    <div class="hud-label">ROUND</div>
                    <div class="hud-value" id="round">1</div>
                </div>
            </div>

            <div id="loading">LOADING...</div>

            <div id="game-area" style="display:none">
                <div class="emoji-stage">
                    <span class="emoji-big" id="emoji-display">❓</span>
                    <div class="question-text">WHAT IS THIS EMOJI?</div>
                </div>

                <form id="guess-form">
                    <div class="options-grid" id="options-grid"></div>
                </form>

                <div id="feedback"></div>
                <button id="next-btn" type="button">▶ NEXT EMOJI</button>
            </div>
        </div>

        <!-- RIGHT SIDEBAR: LEADERBOARD -->
        <div class="side-col side-right">
            <div class="panel">
                <div class="pixel-corner pc-tl"></div>
                <div class="pixel-corner pc-tr"></div>
                <div class="pixel-corner pc-bl"></div>
                <div class="pixel-corner pc-br"></div>
                <div class="panel-title">🏆 LEADERBOARD</div>

                <div class="lb-form">
                    <input class="lb-input" id="player-name" type="text" maxlength="20" placeholder="YOUR NAME">
                    <button class="lb-submit" id="submit-score-btn" type="button">SAVE</button>
                </div>

                <ul class="lb-list" id="lb-list">
                    <li class="lb-empty">NO SCORES YET</li>
                </ul>
            </div>
        </div>

    </div>

    <script>
        // ── STATE ──
        let state = {
            score: 0,
            streak: 0,
            bestStreak: 0,
            round: 1,
            correct: 0,
            wrong: 0,
            currentAnswer: null,
            answered: false,
        };

        // ── DOM REFS ──
        const $score = document.getElementById('score');
        const $streak = document.getElementById('streak');
        const $round = document.getElementById('round');
        const $emoji = document.getElementById('emoji-display');
        const $options = document.getElementById('options-grid');
        const $feedback = document.getElementById('feedback');
        const $nextBtn = document.getElementById('next-btn');
        const $loading = document.getElementById('loading');
        const $game = document.getElementById('game-area');
        const $lbList = document.getElementById('lb-list');
        const $nameIn = document.getElementById('player-name');
        const $saveBtn = document.getElementById('submit-score-btn');
        const $statC = document.getElementById('stat-correct');
        const $statW = document.getElementById('stat-wrong');
        const $statAcc = document.getElementById('stat-acc');
        const $statBest = document.getElementById('stat-best');

        // ── LOAD QUESTION ──
        async function loadQuestion() {
            $loading.style.display = 'block';
            $game.style.display = 'none';
            $feedback.textContent = '';
            $feedback.className = '';
            $nextBtn.style.display = 'none';
            state.answered = false;

            const res = await fetch('/api/question');
            const data = await res.json();
            state.currentAnswer = data.correctName;

            $emoji.textContent = data.emoji;
            $emoji.classList.remove('pop');
            void $emoji.offsetWidth;
            $emoji.classList.add('pop');

            $options.innerHTML = '';
            data.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.dataset.value = opt;
                btn.addEventListener('click', () => submitGuess(opt, btn));
                $options.appendChild(btn);
            });

            $loading.style.display = 'none';
            $game.style.display = 'block';
            updateHUD();
        }

        // ── SUBMIT GUESS ──
        async function submitGuess(guess, clickedBtn) {
            if (state.answered) return;
            state.answered = true;

            // Disable all buttons
            document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);

            const res = await fetch('/api/guess', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ guess, correctName: state.currentAnswer }),
            });
            const data = await res.json();

            if (data.isCorrect) {
                state.score += 10 + state.streak * 2; // streak bonus
                state.streak += 1;
                state.correct++;
                if (state.streak > state.bestStreak) state.bestStreak = state.streak;

                clickedBtn.classList.add('correct');
                $feedback.textContent = getCorrectMessage();
                $feedback.className = 'correct';
            } else {
                state.streak = 0;
                state.wrong++;

                clickedBtn.classList.add('wrong');
                // Highlight correct answer
                document.querySelectorAll('.option-btn').forEach(b => {
                    if (b.dataset.value === data.correctName) b.classList.add('correct');
                });
                $feedback.textContent = getWrongMessage(data.correctName);
                $feedback.className = 'wrong';
            }

            state.round++;
            updateHUD();
            updateStats();
            $nextBtn.style.display = 'block';
        }

        // ── HUD ──
        function updateHUD() {
            $score.textContent = state.score;
            $streak.textContent = state.streak > 0 ? `${state.streak}🔥` : '0';
            $round.textContent = state.round;
        }

        function updateStats() {
            $statC.textContent = state.correct;
            $statW.textContent = state.wrong;
            $statBest.textContent = state.bestStreak;
            const total = state.correct + state.wrong;
            $statAcc.textContent = total > 0 ? Math.round((state.correct / total) * 100) + '%' : '—';
        }

        // ── MESSAGES ──
        const correctMsgs = ['CORRECT! +10 PTS', 'NAILED IT! 🎯', 'NICE ONE! ✨', 'BOOM! 💥', 'PERFECT! ⭐'];
        const wrongMsgs = ['WRONG!', 'NOPE!', 'SO CLOSE!', 'NOT QUITE!'];

        function getCorrectMessage() {
            const msg = correctMsgs[Math.floor(Math.random() * correctMsgs.length)];
            const bonus = state.streak > 1 ? ` STREAK x${state.streak}!` : '';
            return msg + bonus;
        }

        function getWrongMessage(correct) {
            const msg = wrongMsgs[Math.floor(Math.random() * wrongMsgs.length)];
            return `${msg} IT WAS: ${correct.toUpperCase()}`;
        }

        // ── LEADERBOARD ──
        async function loadLeaderboard() {
            const res = await fetch('/api/leaderboard');
            const data = await res.json();
            renderLeaderboard(data);
        }

        function renderLeaderboard(entries) {
            if (!entries.length) {
                $lbList.innerHTML = '<li class="lb-empty">NO SCORES YET</li>';
                return;
            }
            $lbList.innerHTML = entries.map((e, i) => {
                const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
                const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i + 1}.`;
                return `<li class="lb-entry">
        <span class="lb-rank ${rankClass}">${medal}</span>
        <span class="lb-name">${escHtml(e.name)}</span>
        <span class="lb-score">${e.score}</span>
      </li>`;
            }).join('');
        }

        $saveBtn.addEventListener('click', async () => {
            const name = $nameIn.value.trim();
            if (!name) { $nameIn.focus(); return; }
            const res = await fetch('/api/leaderboard', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, score: state.score }),
            });
            const data = await res.json();
            renderLeaderboard(data.leaderboard);
            $nameIn.value = '';
        });

        $nextBtn.addEventListener('click', loadQuestion);

        function escHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // ── INIT ──
        loadQuestion();
        loadLeaderboard();
    </script>
</body>

</html>
